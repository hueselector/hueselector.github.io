<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electronic — hue selector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Lora:wght@700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
      --bg: #f9f8f5; --ink: #1a1a18; --muted: #888880;
      --mono: 'DM Mono', monospace;
      --serif: 'Lora', serif;
      --grotesk: 'Space Grotesk', sans-serif;
    }

    html { background: var(--bg); color: var(--ink); font-family: var(--mono); }

    body { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 32px 0 0; position: relative; }
    .nav-logo { font-family: var(--serif); font-size: 22px; font-weight: 700; color: var(--ink); text-decoration: none; letter-spacing: -0.01em; }
    .nav-links { display: flex; gap: 48px; list-style: none; }
    .nav-links a { font-family: var(--mono); font-size: 12px; color: #4a4a48; text-decoration: none; letter-spacing: 0.06em; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 0.5; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 1.5px; background: var(--ink); transition: all 0.25s; }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-menu { display: none; flex-direction: column; position: absolute; top: calc(100% + 16px); right: 0; background: var(--bg); border: 1px solid #e0dfd9; z-index: 100; min-width: 160px; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: var(--mono); font-size: 12px; color: #4a4a48; text-decoration: none; padding: 16px 24px; border-bottom: 1px solid #e0dfd9; letter-spacing: 0.06em; }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { background: #f0efe9; }






    .playlist-header {
      padding: 100px 0 80px;
      border-bottom: 1px solid #e0dfd9;
    }

    .back-link {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; display: inline-block;
      margin-bottom: 40px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--ink); }

    .playlist-header h1 {
      font-size: 48px; font-weight: 500; letter-spacing: -0.02em;
      text-transform: uppercase; margin-bottom: 16px; line-height: 1;
    }

    .playlist-header .tags {
      font-size: 12px; color: #4a4a48; margin-bottom: 24px; letter-spacing: 0.04em;
    }

    .playlist-header .desc {
      font-size: 13px; font-weight: 300; line-height: 1.9;
      color: var(--ink); opacity: 0.75; max-width: 520px;
    }

    /* ALBUM ROWS */
    .album-row {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 56px;
      align-items: start;
      padding: 64px 0;
      border-bottom: 1px solid #e0dfd9;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }

    .album-row:hover { opacity: 0.7; }

    .album-row img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .album-row .art-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #e8e7e2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 11px;
    }

    .album-row-info { padding-top: 8px; }

    .album-row-title { font-family: var(--grotesk); font-size: 26px; font-weight: 600; color: #333333; letter-spacing: -0.01em; line-height: 1.1; margin-bottom: 14px; }

    .album-row-meta {
      font-size: 12px; font-weight: 400; color: #4a4a48;
      line-height: 2.2; letter-spacing: 0.02em;
    }

    footer {
      padding: 60px 0 40px; border-top: 1px solid #e0dfd9;
      font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
      margin-top: 40px;
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { opacity: 0.6; }

    @media (max-width: 700px) { .nav-links { display: none; } .hamburger { display: flex; } }
    @media (max-width: 700px) {
      .album-row { grid-template-columns: 1fr; gap: 28px; }
      body { padding: 0 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">hue selector</a>
    <ul class="nav-links">
      <li><a href="index.html">home</a></li>
      <li><a href="playlists.html">playlists</a></li>
    </ul>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html">home</a>
      <a href="playlists.html">playlists</a>
    </div>
  </nav>

  <div class="playlist-header">
    <a class="back-link" href="playlists.html">← All playlists</a>
    <h1>Electronic</h1>
    <p class="tags">Electronic, Soul, Funk</p>
    <p class="desc">Sample-heavy, groove-forward, warm. Albums that blur the line between beat-making and full composition.</p>
  </div>

  <!-- ALBUM: ORIGIN -->
  <a class="album-row" href="review.html">
    <img src="images/origin.png" alt="Origin by Vanilla">
    <div class="album-row-info">
      <p class="album-row-title">Origin</p>
      <div class="album-row-meta">
        <strong>Artist:</strong> Vanilla<br>
        <strong>Genre:</strong> Electronic, Hip-Hop<br>
        <strong>Year:</strong> 2015
      </div>
    </div>
  </a>

  <!-- Add more albums below following the same pattern:
  <a class="album-row" href="your-review-page.html">
    <img src="images/your-image.png" alt="Album by Artist">
    <div class="album-row-info">
      <p class="album-row-title">Album Title</p>
      <div class="album-row-meta">
        <strong>Artist:</strong> Artist Name<br>
        <strong>Genre:</strong> Genre<br>
        <strong>Year:</strong> Year
      </div>
    </div>
  </a>
  -->

  <footer>
    <a href="https://www.hueselector.com">hue selector</a> &nbsp;·&nbsp; <a href="https://www.instagram.com/hueselector/" target="_blank" rel="noopener">instagram</a>
  </footer>

</body>
</html>
