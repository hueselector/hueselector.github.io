<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electronic — hue selector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f5;
      --ink: #1a1a18;
      --muted: #888880;
      --mono: 'DM Mono', monospace;
    }

    html { background: var(--bg); color: var(--ink); font-family: var(--mono); }

    body { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 32px 0 0;
    }

    .nav-logo { font-size: 14px; font-weight: 400; color: var(--ink); text-decoration: none; }
    .nav-links { display: flex; gap: 48px; list-style: none; }
    .nav-links a {
      font-size: 13px; color: #4a4a48; text-decoration: none;
      opacity: 1; transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 0.6; }

    .playlist-header {
      padding: 100px 0 80px;
      border-bottom: 1px solid #e0dfd9;
    }

    .back-link {
      font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; display: inline-block;
      margin-bottom: 40px; transition: color 0.2s;
    }
    .back-link:hover { color: var(--ink); }

    .playlist-header h1 {
      font-size: 48px; font-weight: 500; letter-spacing: -0.02em;
      text-transform: uppercase; margin-bottom: 16px; line-height: 1;
    }

    .playlist-header .tags {
      font-size: 12px; color: #4a4a48; margin-bottom: 24px; letter-spacing: 0.04em;
    }

    .playlist-header .desc {
      font-size: 13px; font-weight: 300; line-height: 1.9;
      color: var(--ink); opacity: 0.75; max-width: 520px;
    }

    /* ALBUM ROWS */
    .album-row {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 56px;
      align-items: start;
      padding: 64px 0;
      border-bottom: 1px solid #e0dfd9;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }

    .album-row:hover { opacity: 0.7; }

    .album-row img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .album-row .art-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #e8e7e2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 11px;
    }

    .album-row-info { padding-top: 8px; }

    .album-row-title {
      font-size: 22px; font-weight: 500; text-transform: uppercase;
      letter-spacing: -0.01em; margin-bottom: 16px; line-height: 1;
    }

    .album-row-meta {
      font-size: 12px; font-weight: 400; color: #4a4a48;
      line-height: 2.2; letter-spacing: 0.02em;
    }

    footer {
      padding: 60px 0 40px; border-top: 1px solid #e0dfd9;
      font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
      margin-top: 40px;
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { opacity: 0.6; }

    @media (max-width: 700px) {
      .album-row { grid-template-columns: 1fr; gap: 28px; }
      body { padding: 0 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">hue selector</a>
    <ul class="nav-links">
      <li><a href="index.html">home</a></li>
      <li><a href="playlists.html">playlists</a></li>
      <!-- <li><a href="#">articles</a></li> -->
    </ul>
  </nav>

  <div class="playlist-header">
    <a class="back-link" href="playlists.html">← All playlists</a>
    <h1>Electronic</h1>
    <p class="tags">Electronic, Soul, Funk</p>
    <p class="desc">Sample-heavy, groove-forward, warm. Albums that blur the line between beat-making and full composition.</p>
  </div>

  <!-- ALBUM: ORIGIN -->
  <a class="album-row" href="review.html">
    <img src="images/origin.png" alt="Origin by Vanilla">
    <div class="album-row-info">
      <p class="album-row-title">Origin</p>
      <div class="album-row-meta">
        <strong>Artist:</strong> Vanilla<br>
        <strong>Genre:</strong> Electronic, Hip-Hop<br>
        <strong>Year:</strong> 2015
      </div>
    </div>
  </a>

  <!-- Add more albums below following the same pattern:
  <a class="album-row" href="your-review-page.html">
    <img src="images/your-image.png" alt="Album by Artist">
    <div class="album-row-info">
      <p class="album-row-title">Album Title</p>
      <div class="album-row-meta">
        <strong>Artist:</strong> Artist Name<br>
        <strong>Genre:</strong> Genre<br>
        <strong>Year:</strong> Year
      </div>
    </div>
  </a>
  -->

  <footer>
    <a href="https://www.hueselector.com">hue selector</a> &nbsp;·&nbsp; <a href="https://www.instagram.com/hueselector/" target="_blank" rel="noopener">instagram</a>
  </footer>

</body>
</html>
